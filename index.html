<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Your Training Goals — Member Survey</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1a1a18;
  --ink-mid: #4a4a44;
  --ink-light: #8a8a80;
  --cream: #f7f5ef;
  --cream-dark: #edeae0;
  --accent: #b85c38;
  --accent-light: #f0e4dc;
  --border: #d8d4c8;
  --success: #3a6b3a;
}

html, body {
  height: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
}

/* Progress bar */
#progress-bar {
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 3px;
  z-index: 200;
  background: rgba(0,0,0,0.08);
}
#progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
  transition: width 0.5s ease;
  width: 0%;
}

/* Slide viewport */
#slide-viewport {
  width: 100%;
  height: 100dvh;
  overflow: hidden;
  position: relative;
}

/* Slide wrapper — animates in/out */
.slide-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: clamp(2rem, 6vw, 4rem) clamp(1.25rem, 5vw, 3rem);
  overflow-y: auto;
}

.slide-wrap.slide-dark { background: var(--ink); }
.slide-wrap.slide-light { background: var(--cream); }

/* Inner content */
.slide-inner {
  width: 100%;
  max-width: 560px;
}

/* Back / counter chrome */
#back-btn {
  position: fixed;
  top: 12px; left: 1.25rem;
  z-index: 300;
  background: rgba(247,245,239,0.85);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px 5px 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12.5px;
  color: var(--ink-mid);
  cursor: pointer;
  display: none;
  align-items: center;
  gap: 5px;
  backdrop-filter: blur(4px);
  min-height: 32px;
}
#back-btn:hover { background: white; }

#q-counter {
  position: fixed;
  top: 16px; right: 1.25rem;
  z-index: 300;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-light);
  display: none;
}

/* Welcome */
.welcome-gym {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  font-weight: 500;
  margin-bottom: 1.5rem;
}
.welcome-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.4rem, 7vw, 4rem);
  font-weight: 400;
  line-height: 1.1;
  color: var(--cream);
  margin-bottom: 1.25rem;
}
.welcome-desc {
  font-size: 15px;
  color: #b0ad9f;
  font-weight: 300;
  line-height: 1.65;
  max-width: 400px;
  margin-bottom: 2.5rem;
}
.welcome-desc strong { color: #d8d4c8; font-weight: 400; }

/* Question layout */
.q-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 1rem;
}
.q-badge {
  font-size: 10px;
  font-weight: 500;
  padding: 3px 9px;
  border-radius: 100px;
  white-space: nowrap;
}
.q-badge.standard { background: #e8e4d8; color: var(--ink-mid); }
.q-badge.key { background: var(--accent-light); color: var(--accent); }

.q-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.35rem, 3.5vw, 1.85rem);
  font-weight: 400;
  line-height: 1.3;
  color: var(--ink);
  margin-bottom: 0.5rem;
}
.q-hint {
  font-size: 13.5px;
  color: var(--ink-light);
  font-style: italic;
  line-height: 1.55;
  margin-bottom: 1.4rem;
}

/* Text inputs */
.tf-input {
  width: 100%;
  border: none;
  border-bottom: 2px solid var(--border);
  padding: 0.6rem 0;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  color: var(--ink);
  background: transparent;
  outline: none;
  transition: border-color 0.2s;
  display: block;
}
.tf-input:focus { border-color: var(--accent); }

.tf-textarea {
  width: 100%;
  border: none;
  border-bottom: 2px solid var(--border);
  padding: 0.6rem 0;
  font-family: 'DM Sans', sans-serif;
  font-size: 16px;
  color: var(--ink);
  background: transparent;
  outline: none;
  transition: border-color 0.2s;
  resize: none;
  min-height: 80px;
  line-height: 1.6;
  display: block;
  overflow: hidden;
}
.tf-textarea:focus { border-color: var(--accent); }

.enter-hint {
  font-size: 12px;
  color: var(--ink-light);
  margin-top: 1rem;
  display: flex;
  align-items: center;
  gap: 6px;
}
.enter-hint kbd {
  font-family: 'DM Sans', sans-serif;
  font-size: 10px;
  background: var(--cream-dark);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 6px;
  color: var(--ink-mid);
}

/* Optional sub-field */
.sub-field {
  margin-top: 1.5rem;
  padding-top: 1.25rem;
  border-top: 1px solid var(--cream-dark);
}
.sub-label {
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-light);
  font-weight: 500;
  margin-bottom: 0.5rem;
}

/* Checkbox grid */
.choice-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 0.5rem;
}
@media (max-width: 480px) { .choice-grid { grid-template-columns: 1fr; } }

.choice-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0.8rem 1rem;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: white;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  min-height: 44px;
  width: 100%;
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  user-select: none;
}
.choice-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.choice-btn.selected { border-color: var(--accent); background: var(--accent-light); }

.choice-letter {
  font-size: 11px;
  font-weight: 600;
  width: 22px; height: 22px;
  border-radius: 5px;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: var(--ink-mid);
  background: var(--cream-dark);
  transition: all 0.15s;
}
.choice-btn.selected .choice-letter {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
}
.choice-text { font-size: 14px; line-height: 1.35; }

/* Scale */
.scale-labels {
  display: flex;
  justify-content: space-between;
  font-size: 11.5px;
  color: var(--ink-light);
  margin-bottom: 0.75rem;
}
.scale-pips { display: flex; gap: 8px; }
.scale-pip {
  flex: 1;
  aspect-ratio: 1;
  max-width: 60px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  background: white;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 500;
  color: var(--ink-mid);
  transition: all 0.15s;
  min-height: 44px;
  font-family: 'DM Sans', sans-serif;
}
.scale-pip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.scale-pip.selected { border-color: var(--accent); background: var(--accent); color: white; }

/* Buttons */
.cta-row {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 1.75rem;
  flex-wrap: wrap;
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--ink);
  color: var(--cream);
  border: none;
  border-radius: 8px;
  padding: 0.85rem 1.75rem;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  min-height: 44px;
}
.btn-primary:hover { background: #2e2e28; }
.btn-primary:active { transform: scale(0.97); }
.btn-primary:disabled { background: var(--border); cursor: not-allowed; }
.btn-primary.on-dark { background: var(--cream); color: var(--ink); }
.btn-primary.on-dark:hover { background: #ece9e2; }

.btn-skip {
  background: none;
  border: none;
  color: var(--ink-light);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
  padding: 0.5rem 0;
  min-height: 44px;
  transition: color 0.15s;
}
.btn-skip:hover { color: var(--ink); }

/* Success */
.success-icon {
  width: 60px; height: 60px;
  background: var(--ink);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 1.5rem;
}
.success-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 5vw, 2.5rem);
  font-weight: 400;
  margin-bottom: 0.75rem;
}
.success-desc {
  font-size: 15px;
  color: var(--ink-mid);
  line-height: 1.65;
  max-width: 400px;
  margin-bottom: 2rem;
}
.results-panel {
  background: var(--cream-dark);
  border-radius: 14px;
  padding: 1.5rem;
  width: 100%;
}
.results-panel h3 {
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-light);
  margin-bottom: 1rem;
  font-weight: 500;
}
.result-row {
  margin-bottom: 1rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}
.result-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.result-q { font-size: 11.5px; font-weight: 500; color: var(--ink-mid); margin-bottom: 3px; }
.result-a { font-size: 14px; color: var(--ink); line-height: 1.5; }

/* Transition animation classes */
.slide-wrap.enter-from-below {
  animation: slideUpIn 0.48s cubic-bezier(.4,0,.2,1) forwards;
}
.slide-wrap.enter-from-above {
  animation: slideDownIn 0.48s cubic-bezier(.4,0,.2,1) forwards;
}
.slide-wrap.exit-to-above {
  animation: slideUpOut 0.48s cubic-bezier(.4,0,.2,1) forwards;
}
.slide-wrap.exit-to-below {
  animation: slideDownOut 0.48s cubic-bezier(.4,0,.2,1) forwards;
}

@keyframes slideUpIn {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
@keyframes slideDownIn {
  from { transform: translateY(-100%); }
  to   { transform: translateY(0); }
}
@keyframes slideUpOut {
  from { transform: translateY(0); }
  to   { transform: translateY(-100%); }
}
@keyframes slideDownOut {
  from { transform: translateY(0); }
  to   { transform: translateY(100%); }
}
</style>
</head>
<body>

<div id="progress-bar"><div id="progress-fill"></div></div>

<button id="back-btn" onclick="goBack()">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7L9 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  Back
</button>

<div id="q-counter"></div>

<div id="slide-viewport"></div>

<script>
// ── State ──────────────────────────────────────────────
const answers = { qname:'', q1:'', q2:[], q3:'', q4:null, q7:'', q7b:'' };

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRsKkCpFk1ReXEV6o6ynPKcabqiMDCN3Y-0zTgBFaPmQ9RgoSmsePWsWKeLvg2o_M/exec";

const questionLabels = {
  qname: 'Name',
  q1: "Six months from now, what's different?",
  q2: 'Goal types',
  q3: 'Specific number or target',
  q4: 'Urgency (1–5)',
  q7: "What's working against you",
  q7b: 'Anything else'
};

let currentIndex = 0;
let isAnimating = false;

// ── Slide definitions ──────────────────────────────────
function slides() {
  return [
    // 0 — Welcome
    () => `
      <div class="slide-wrap slide-dark enter-from-below" id="active-slide">
        <div class="slide-inner">
          <div class="welcome-gym">Starting Strength Boise</div>
          <h1 class="welcome-title">What Are You<br>Training For?</h1>
          <p class="welcome-desc"><strong>6 quick questions</strong> to help your coach understand what matters most to you — and build a plan around it.</p>
          <div class="cta-row">
            <button class="btn-primary on-dark" onclick="goNext()">
              Start
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7H11M7 3L11 7L7 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <span style="font-size:12px;color:#7a7a6a">Takes ~2 minutes</span>
          </div>
        </div>
      </div>`,

    // 1 — Name
    () => `
      <div class="slide-wrap slide-light enter-from-below" id="active-slide">
        <div class="slide-inner">
          <div class="q-meta"><span class="q-badge standard">Name</span></div>
          <h2 class="q-title">What's your name?</h2>
          <input class="tf-input" type="text" id="qname" name="qname" placeholder="Your full name…" autocomplete="name" value="${esc(answers.qname)}">
          <div class="enter-hint"><kbd>Enter ↵</kbd> to continue</div>
          <div class="cta-row">
            <button class="btn-primary" onclick="advanceIfValid()">
              OK
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7H11M7 3L11 7L7 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
      </div>`,

    // 2 — Q1
    () => `
      <div class="slide-wrap slide-light enter-from-below" id="active-slide">
        <div class="slide-inner">
          <div class="q-meta"><span class="q-badge key">★ Key question</span></div>
          <h2 class="q-title">Imagine it's six months from now and training has gone really well. What's different about your life?</h2>
          <p class="q-hint">Think beyond the gym — energy, confidence, what you can do, how you feel.</p>
          <textarea class="tf-textarea" id="q1" name="q1" placeholder="Six months from now I'd be able to…" rows="3">${esc(answers.q1)}</textarea>
          <div class="enter-hint"><kbd>Shift ↵</kbd> new line &nbsp;·&nbsp; <kbd>Enter ↵</kbd> continue</div>
          <div class="cta-row">
            <button class="btn-primary" onclick="advanceIfValid()">
              Next
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7H11M7 3L11 7L7 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
      </div>`,

    // 3 — Q2 multi-select
    () => {
      const opts = [
        ['A','Hit a specific lift number'],
        ['B','Improve body composition'],
        ['C','Perform better at a sport or activity'],
        ['D','Hurt less'],
        ['E','Build a consistent habit'],
        ['F','Compete in a meet'],
        ['G','Just enjoy training'],
      ];
      const btns = opts.map(([letter, label]) => {
        const sel = answers.q2.includes(label) ? 'selected' : '';
        return `<button class="choice-btn ${sel}" data-value="${label}" onclick="toggleCheck(this)">
          <span class="choice-letter">${sel ? '✓' : letter}</span>
          <span class="choice-text">${label}</span>
        </button>`;
      }).join('');
      return `
      <div class="slide-wrap slide-light enter-from-below" id="active-slide">
        <div class="slide-inner">
          <div class="q-meta"><span class="q-badge standard">Q 2</span><span style="font-size:12px;color:var(--ink-light)">2 / 6</span></div>
          <h2 class="q-title">What does your goal look like?</h2>
          <p class="q-hint">Pick all that apply.</p>
          <div class="choice-grid">${btns}</div>
          <div class="cta-row">
            <button class="btn-primary" onclick="advanceIfValid()">
              Next
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7H11M7 3L11 7L7 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
      </div>`;
    },

    // 4 — Q3 specific number
    () => `
      <div class="slide-wrap slide-light enter-from-below" id="active-slide">
        <div class="slide-inner">
          <div class="q-meta"><span class="q-badge key">★ Key question</span><span style="font-size:12px;color:var(--ink-light)">3 / 6</span></div>
          <h2 class="q-title">Is there a specific number attached to any of your goals?</h2>
          <p class="q-hint">A target lift, body composition — anything concrete. It's okay if you don't have one yet.</p>
          <input class="tf-input" type="text" id="q3" name="q3" placeholder="e.g. deadlift 300 lbs, squat bodyweight…" value="${esc(answers.q3)}">
          <div class="enter-hint"><kbd>Enter ↵</kbd> to continue &nbsp;·&nbsp; or skip</div>
          <div class="cta-row">
            <button class="btn-primary" onclick="goNext()">
              Next
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7H11M7 3L11 7L7 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
      </div>`,

    // 5 — Q4 urgency scale
    () => {
      const pips = [1,2,3,4,5].map(n => {
        const sel = answers.q4 === n ? 'selected' : '';
        return `<button class="scale-pip ${sel}" onclick="selectScale(this, ${n})">${n}</button>`;
      }).join('');
      return `
      <div class="slide-wrap slide-light enter-from-below" id="active-slide">
        <div class="slide-inner">
          <div class="q-meta"><span class="q-badge standard">Q 4</span><span style="font-size:12px;color:var(--ink-light)">4 / 6</span></div>
          <h2 class="q-title">How urgent does this goal feel to you right now?</h2>
          <div class="scale-labels"><span>No rush</span><span>Very urgent</span></div>
          <div class="scale-pips">${pips}</div>
        </div>
      </div>`;
    },

    // 6 — Q7 outside gym
    () => `
      <div class="slide-wrap slide-light enter-from-below" id="active-slide">
        <div class="slide-inner">
          <div class="q-meta"><span class="q-badge key">★ Key question</span><span style="font-size:12px;color:var(--ink-light)">6 / 6</span></div>
          <h2 class="q-title">What's one thing outside the gym you could change to accelerate your progress?</h2>
          <p class="q-hint">Sleep, stress, diet, schedule, pain — anything interfering with progress.</p>
          <textarea class="tf-textarea" id="q7" name="q7" placeholder="Honestly, the thing that gets in the way most is…" rows="3">${esc(answers.q7)}</textarea>
          <div class="sub-field">
            <div class="sub-label">Optional — anything else?</div>
            <input class="tf-input" type="text" id="q7b" name="q7b" placeholder="Anything else you want your coach to know…" value="${esc(answers.q7b)}">
          </div>
          <div class="cta-row" style="margin-top:1.75rem">
            <button class="btn-primary" id="submitBtn" onclick="submitSurvey()">
              Submit my goals
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7H11M7 3L11 7L7 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
          <p style="font-size:12px;color:var(--ink-light);margin-top:1rem;">Your answers go directly to your coaching team.</p>
        </div>
      </div>`,

    // 8 — Success
    () => {
      const rows = Object.entries(questionLabels).map(([key, label]) => {
        const val = answers[key];
        let display = Array.isArray(val) ? (val.length ? val.join(', ') : '—') : (val || '—');
        if (display === '—' && key === 'q7b') return '';
        return `<div class="result-row"><div class="result-q">${label}</div><div class="result-a">${esc(display)}</div></div>`;
      }).join('');
      return `
      <div class="slide-wrap slide-light enter-from-below" id="active-slide">
        <div class="slide-inner" style="text-align:center;align-items:center;display:flex;flex-direction:column">
          <div class="success-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M5 12L10 17L19 8" stroke="#f7f5ef" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h2 class="success-title">Your goals are in.</h2>
          <p class="success-desc">Your coach will review these before your next session and build your program around what you told us.</p>
          <div class="results-panel">
            <h3>Your responses</h3>
            ${rows}
          </div>
        </div>
      </div>`;
    },
  ];
}

const SLIDE_COUNT = 8;

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Render & navigate ──────────────────────────────────
function render(index, direction) {
  const viewport = document.getElementById('slide-viewport');
  const defs = slides();
  const oldSlide = document.getElementById('active-slide');

  // Render new slide off-screen
  const temp = document.createElement('div');
  temp.innerHTML = defs[index]();
  const newSlide = temp.firstElementChild;

  // Set incoming animation class
  newSlide.classList.remove('enter-from-below');
  newSlide.classList.add(direction === 'forward' ? 'enter-from-below' : 'enter-from-above');

  if (oldSlide) {
    // Animate old slide out
    const exitClass = direction === 'forward' ? 'exit-to-above' : 'exit-to-below';
    oldSlide.classList.add(exitClass);
    oldSlide.addEventListener('animationend', () => oldSlide.remove(), { once: true });
  }

  viewport.appendChild(newSlide);

  // Wire up live input listeners
  wireInputs(newSlide);

  // Focus first input
  setTimeout(() => {
    const input = newSlide.querySelector('input, textarea');
    if (input) input.focus();
  }, 200);

  currentIndex = index;
  updateChrome();
}

function wireInputs(slide) {
  const qname = slide.querySelector('#qname');
  if (qname) {
    qname.addEventListener('input', e => { answers.qname = e.target.value; updateChrome(); });
    qname.addEventListener('keydown', onEnterAdvance);
  }

  const q1 = slide.querySelector('#q1');
  if (q1) {
    q1.addEventListener('input', e => { answers.q1 = e.target.value; autoResize(e.target); });
    q1.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); advanceIfValid(); } });
  }

  const q3 = slide.querySelector('#q3');
  if (q3) {
    q3.addEventListener('input', e => { answers.q3 = e.target.value; });
    q3.addEventListener('keydown', onEnterNext);
  }

  const q7 = slide.querySelector('#q7');
  if (q7) {
    q7.addEventListener('input', e => { answers.q7 = e.target.value; autoResize(e.target); });
    q7.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitSurvey(); } });
  }

  const q7b = slide.querySelector('#q7b');
  if (q7b) {
    q7b.addEventListener('input', e => { answers.q7b = e.target.value; });
    q7b.addEventListener('keydown', onEnterAdvance);
  }
}

function onEnterAdvance(e) { if (e.key === 'Enter') { e.preventDefault(); advanceIfValid(); } }
function onEnterNext(e) { if (e.key === 'Enter') { e.preventDefault(); goNext(); } }

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

// ── Advance logic ──────────────────────────────────────
function goNext() {
  if (currentIndex < SLIDE_COUNT - 1) render(currentIndex + 1, 'forward');
}

function goBack() {
  if (currentIndex > 0) render(currentIndex - 1, 'backward');
}

function advanceIfValid() {
  if (isValid()) goNext();
  else flashInvalid();
}

function isValid() {
  switch(currentIndex) {
    case 1: return answers.qname.trim().length > 0;
    case 2: return answers.q1.trim().length > 2;
    case 3: return answers.q2.length > 0;
    case 6: return answers.q7.trim().length > 2;
    default: return true;
  }
}

function flashInvalid() {
  const input = document.querySelector('#active-slide .tf-input, #active-slide .tf-textarea');
  if (!input) return;
  input.focus();
  input.animate([
    { transform: 'translateX(0)' },
    { transform: 'translateX(-6px)' },
    { transform: 'translateX(6px)' },
    { transform: 'translateX(0)' }
  ], { duration: 250, easing: 'ease-in-out' });
}

// ── Choice handlers ────────────────────────────────────
function toggleCheck(btn) {
  btn.classList.toggle('selected');
  const letter = btn.querySelector('.choice-letter');
  const val = btn.dataset.value;
  if (btn.classList.contains('selected')) {
    if (!answers.q2.includes(val)) answers.q2.push(val);
    letter.textContent = '✓';
  } else {
    answers.q2 = answers.q2.filter(v => v !== val);
    // restore original letter
    const opts = ['Hit a specific lift number','Improve body composition','Perform better at a sport or activity','Hurt less','Build a consistent habit','Compete in a meet','Just enjoy training'];
    const letters = 'ABCDEFG';
    const idx = opts.indexOf(val);
    letter.textContent = idx >= 0 ? letters[idx] : '?';
  }
  updateChrome();
}

function selectScale(btn, val) {
  answers.q4 = val;
  document.querySelectorAll('#active-slide .scale-pip').forEach(p => p.classList.remove('selected'));
  btn.classList.add('selected');
  updateChrome();
  setTimeout(() => goNext(), 350);
}

// ── Chrome updates ─────────────────────────────────────
function updateChrome() {
  // Progress
  let n = 0;
  if (answers.qname.trim()) n++;
  if (answers.q1.trim().length > 2) n++;
  if (answers.q2.length > 0) n++;
  if (answers.q3.trim()) n++;
  if (answers.q4 !== null) n++;
  if (answers.q7.trim().length > 2) n++;
  document.getElementById('progress-fill').style.width = (n / 6 * 100) + '%';

  // Back button
  const backBtn = document.getElementById('back-btn');
  backBtn.style.display = (currentIndex > 0 && currentIndex < 7) ? 'flex' : 'none';

  // Counter
  const counter = document.getElementById('q-counter');
  if (currentIndex >= 1 && currentIndex <= 6) {
    counter.textContent = currentIndex + ' / 6';
    counter.style.display = 'block';
  } else {
    counter.style.display = 'none';
  }
}

// ── Keyboard ───────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') goBack();
});

// ── Submission ─────────────────────────────────────────
async function submitSurvey() {
  const btn = document.getElementById('submitBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name:         answers.qname,
        yearFromNow:  answers.q1,
        goalTypes:    answers.q2.length ? answers.q2.join(', ') : '—',
        target:       answers.q3 || '—',
        urgency:      answers.q4 !== null ? String(answers.q4) : '—',
        obstacles:    answers.q7 || '—',
        anythingElse: answers.q7b || '—'
      })
    });
  } catch(err) { console.error(err); }

  render(7, 'forward');
}

// ── Init ───────────────────────────────────────────────
render(0, 'forward');
</script>
</body>
</html>
